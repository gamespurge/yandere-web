<!DOCTYPE html>
<html lang="en-us">

<head>
	<base href="https://cdn.jsdelivr.net/gh/bubblfan/web-port@master/yandere-simulator/">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>YandereSimulator</title>
    <script src="Build/UnityLoader.js"></script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #unityContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        #unityContainer canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        #loader {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999999;
    transition: opacity .5s ease;
}

#loader.hide {
    opacity: 0;
    pointer-events: none;
}

.spinner {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 6px solid rgba(255,255,255,.15);
    border-top-color: white;
    animation: spin .8s linear infinite;
    margin-bottom: 24px;
}

#loading-text {
    color: white;
    font-size: 24px;
    font-family: Arial, sans-serif;
}

@keyframes spin {
    to {
        transform: rotate(360deg);
    }
}
    </style>

    <script>
        let max = 0,
            done = 0;

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                const buffers = [];
                const fetchPart = (index) => {
                    if (index >= fileParts.length) {
                        const blob = new Blob(buffers);
                        resolve(URL.createObjectURL(blob));
                        return;
                    }
                    fetch(fileParts[index])
                        .then(r => r.arrayBuffer())
                        .then(b => {
                            buffers.push(b);
                            done++;
                            document.querySelector("#loading-text").textContent = `LOADING... (${done}/${max})`;
                            fetchPart(index + 1);
                        })
                        .catch(reject);
                };
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            const parts = [];
            for (let i = start; i <= end; i++) parts.push(`${file}.part${i}`);
            max += end - start + 1;
            return parts;
        }

		function hideLoader() {
    const loader = document.getElementById("loader");

    loader.classList.add("hide");

    setTimeout(() => {
        loader.remove();
    }, 500);
}

        Promise.all([
            mergeFiles(getParts("Build/YandereSim.data.unityweb", 1, 5)),
        ]).then(([dataUrl]) => {
            const json = {
                companyName: "YandereDev",
                productName: "YandereSimulator",
                dataUrl: dataUrl,
                wasmCodeUrl: "YandereSim.wasm.code.unityweb",
                wasmFrameworkUrl: "YandereSim.wasm.framework.unityweb",
                TOTAL_MEMORY: 268435456,
                graphicsAPI: ["WebGL 2.0", "WebGL 1.0"],
                webglContextAttributes: {
                    preserveDrawingBuffer: false
                },
                splashScreenStyle: "Dark",
                backgroundColor: "#000000",
                cacheControl: {
                    default: "must-revalidate"
                }
            };

            const blob = new Blob([JSON.stringify(json)], {
                type: "application/json"
            });
            const blobUrl = URL.createObjectURL(blob);

            const gameInstance = UnityLoader.instantiate(
    "unityContainer",
    json,
    {
        url: blobUrl,

        Module: {
            onRuntimeInitialized: () => {

                const canvas = document.querySelector("#unityContainer canvas");

                function waitForFirstFrame() {

                    if (!canvas) {
                        requestAnimationFrame(waitForFirstFrame);
                        return;
                    }

                    const gl = canvas.getContext("webgl2") ||
                               canvas.getContext("webgl");

                    if (!gl) {
                        requestAnimationFrame(waitForFirstFrame);
                        return;
                    }

                    const pixels = new Uint8Array(4);

                    try {
                        gl.readPixels(
                            0,
                            0,
                            1,
                            1,
                            gl.RGBA,
                            gl.UNSIGNED_BYTE,
                            pixels
                        );

                        // Once rendering begins, remove the loader.
                        hideLoader();

                    } catch {

                        requestAnimationFrame(waitForFirstFrame);

                    }
                }

                requestAnimationFrame(waitForFirstFrame);
            }
        }
    }
);

            const resize = () => {
                const container = document.getElementById("unityContainer");
                container.style.width = window.innerWidth + "px";
                container.style.height = window.innerHeight + "px";
            };
            window.addEventListener("resize", resize);
            resize();
        });
    </script>
</head>

<body>
   <div id="loader">
    <div class="spinner"></div>
    <div id="loading-text">Loading 0%</div>
</div>

<div id="unityContainer"></div>
</body>

</html>
